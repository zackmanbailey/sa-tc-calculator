<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" width="400" height="180">
  <!-- Titan Carports logo -->
  <!-- Left fin / prong (sweeps up-left) -->
  <polygon points="120,155 80,10 108,148 118,155" fill="#d0d0d0" stroke="#888888" stroke-width="1.5"/>
  <polygon points="80,10 108,148 90,12" fill="#e8e8e8" stroke="#888888" stroke-width="1"/>
  <!-- Right fin / prong (sweeps up-right) mirror -->
  <polygon points="140,155 180,10 152,148 142,155" fill="#d0d0d0" stroke="#888888" stroke-width="1.5"/>
  <polygon points="180,10 152,148 170,12" fill="#e8e8e8" stroke="#888888" stroke-width="1"/>
  <!-- Center stem (goes straight down to point) -->
  <polygon points="118,155 142,155 130,175" fill="#c0c0c0" stroke="#888888" stroke-width="1.5"/>
  <!-- "TITAN" text - bold gray -->
  <text x="200" y="85" font-family="Arial Black, Arial" font-weight="900" font-size="62" letter-spacing="4" fill="#b0b0b0">TITAN</text>
  <!-- "CARPORTS" text - bold dark red -->
  <text x="200" y="148" font-family="Arial Black, Arial" font-weight="900" font-size="44" letter-spacing="3" fill="#8B0000">CARPORTS</text>
</svg>
